# src/main/resources/application.conf

embed {
  model = "mxbai-embed-large"
  batch = 4
}

answer {
  model = "llama3.2:1b-instruct-q4_K_M"
}

index {
  outRoot = "C:/Users/Ali/CS441/msr-rag-hw1/out_mr_out"  # <-- this is the one that actually has segments_*
  shards  = 4                                            # <-- you have 0..3
}


ask {
  k                 = 4
  perShardFetch     = 10
  minTopScore       = 0.28
  minKeywordOverlap = 1
  temperature       = 0.0
  numCtxTokens      = 2048
  refusal           = "I don't know based on the MSR corpus."
}

# Optional: keep these here if other tools use them; they won’t hurt.
io {
  pdfListFile = "E:/msr_data/msr_pdfs.txt"
  workDir     = "E:/msr_data/artifacts"
}

stats {
  outDir      = "E:/msr_data/artifacts/stats"
  topN        = 3000
  minLen      = 3
  batch       = 64
  neighborsK  = 5
}
