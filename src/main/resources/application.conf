io {
  pdfListFile = "E:/msr_data/msr_pdfs.txt"
  workDir     = "E:/msr_data/artifacts"
}

embed {
  model = "mxbai-embed-large"
  batch = 4
}

index {
  outRoot = "C:/tmp/index_shards_mr_out"  # points to existing shards
  shards  = 2
}

answer {
  model = "llama3.2:1b-instruct-q4_K_M"
}
stats {
  outDir      = "E:/msr_data/artifacts/stats"   # or keep C:/tmp/stats if you prefer
  topN        = 3000
  minLen      = 3
  batch       = 64
  neighborsK  = 5
}
ask {
  k               = 4
  perShardFetch   = 10
  minTopScore     = 0.28
  minKeywordOverlap = 1
  temperature     = 0.0
  numCtxTokens    = 2048
  refusal         = "I don't know based on the MSR corpus."
}
