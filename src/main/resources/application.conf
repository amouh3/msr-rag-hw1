io {
  pdfListFile = "input/pdf_list2.txt"
  workDir     = "out/local"
}

# MR writes to <mr.outputDir>_mr_out; keep these matched:
index {
  outRoot = "out_mr_mr_out"
  shards  = 1
}

embed.model  = "mxbai-embed-large"
answer.model = "llama3.2:1b-instruct-q4_K_M"   # <- one you have locally

ask {
  k                 = 8
  perShardFetch     = 8
  minTopScore       = 0.35
  minKeywordOverlap = 1
  temperature       = 0.2
  numCtxTokens      = 2048
  refusal           = "I don't know based on the MSR corpus."
}

mr {
  inputList = "input/pdf_list2.txt"
  outputDir = "out_mr"     # -> index dir becomes out_mr_mr_out
  shards    = 1
  mode      = "local"
}

embed {
  maxChars = 1000
  overlap  = 200
  batch    = 1
}
