# conf/mr.local.conf

mr {
  # Text file containing one PDF path per line (use plain Windows paths here)
  inputList = "C:/Users/Ali/CS441/msr-rag-hw1/input/pdf_list.txt"

  # Output directory; must NOT already exist if your job creates it
  outputDir = "C:/Users/Ali/CS441/msr-rag-hw1/out"

  # Number of shards/partitions for your index (required by JobMain)
  shards = 4

  # Hadoop reducers (keep small on Windows)
  numReducers = 2
}

embed {
  # Ollama settings for embeddings
  url   = "http://localhost:11434"
  model = "mxbai-embed-large"   # use your project’s embed model name
  batch = 16                    # safe default
  timeoutSec = 120              # optional cushion
}

# Optional, but common in these projects:
index {
  maxCharsPerChunk = 1400
  overlapChars     = 200
}
