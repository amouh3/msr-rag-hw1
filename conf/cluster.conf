# omit mr.mode (or set "yarn"); you’ll pass --mode yarn at runtime
mr.inputList = "s3a://cs-441-bucket/input/pdf_list.txt"   # file of S3/HDFS URIs to PDFs
mr.outputDir = "s3a://cs-441-bucket/index_shards"         # job writes to <outputDir>_mr_out
mr.shards    = 32                                       # tune for cluster size
embed.model  = "mxbai-embed-large"
embed.maxChars = 1000
embed.overlap  = 200
embed.batch    = 16                                     # bigger batch okay on cluster
