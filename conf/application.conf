io {
  pdfListFile = "input/pdf_list2.txt"   # bundled
  workDir     = "out/local"
}

embed {
  model    = "mxbai-embed-large"
  maxChars = 1000
  overlap  = 200
  batch    = 1
}

index {
  outRoot = "out_mr_out"
  shards  = 1
}

answer.model = "llama3.2:1b-instruct-q4_K_M"

ask {
  k = 8
  perShardFetch = 8
  minTopScore = 0.35
  minKeywordOverlap = 2
  temperature = 0.2
  numCtxTokens = 2048
  refusal = "I don't know based on the MSR corpus."
}

stats {
  outputDir = "out/stats"     # so CSVs land in-repo but ignored via .gitignore
  topVocab  = 3000
  kNN       = 5
}
