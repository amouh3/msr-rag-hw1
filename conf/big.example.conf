# big.example.conf
# Copy to conf/big.conf and EDIT paths for your machine.
# This file is ONLY an example/template.

io {
  # Absolute path to a text file: one absolute PDF path per line.
  # Example on Windows:  "D:/msr_corpus/pdfs_list.txt"
  # Example on macOS:    "/Users/you/data/msr_pdfs.txt"
  pdfListFile = "/ABSOLUTE/PATH/TO/your_big_pdf_list.txt"

  # A working directory for temporary artifacts (safe to delete).
  # Keep this inside your repo if you want local, reproducible runs.
  workDir = "out/big/work"
}

embed {
  model    = "mxbai-embed-large"
  maxChars = 1000
  overlap  = 200
  batch    = 4
}

index {
  # Where reducers write Lucene shards locally (or where you’ll copy them to).
  # For local runs keep it inside repo; for EMR/YARN you’ll copy to a local folder
  # on the master as part of your workflow.
  outRoot = "out_mr_out_big"

  # Increase for larger corpora. Each shard becomes a folder index_shard_<id>.
  shards  = 4
}

answer.model = "llama3.2:1b-instruct-q4_K_M"

ask {
  k                 = 8
  perShardFetch     = 8
  minTopScore       = 0.35
  minKeywordOverlap = 2
  temperature       = 0.2
  numCtxTokens      = 2048
  refusal           = "I don't know based on the MSR corpus."
}

stats {
  # Where CSVs land for big runs.
  outputDir = "out/stats_big"
  topVocab  = 5000
  kNN       = 10
}
