app { job = "extract-chunk-smoke" }
io {
  pdfListFile = "E:/msr_data/msr_pdfs.txt"
  workDir     = "E:/msr_data/artifacts"
}
embed {
  model    = "mxbai-embed-large"
  maxChars = 1000
  overlap  = 200
  batch    = 8
}

index {
  out     = "E:/msr_data/artifacts/index.csv"
  maxDocs = 999999
}

search {
  query = "data loss bugs Android" #testing diff queries
  k = 10               # optional: how many results to print
}
mr {
  inputList = "file:///C:/tmp/pdf_list.txt"   # one absolute PDF path per line
  outputDir = "file:///C:/tmp/index_shards"   # will create index_shards_mr_out/
  shards    = 2
}