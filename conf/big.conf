io {
  pdfListFile = "E:/msr_data/msr_pdfs.txt"   # your large list
  workDir     = "E:/msr_data/out_local"
}
mr {
  inputList = ${io.pdfListFile}
  outputDir = "E:/msr_data/out_mr"           # MR job writes to out_mr_out
  shards    = 4                               # choose 1..N; must match AskLucene
  mode      = "local"
}
index {
  outRoot = ${mr.outputDir} "_mr_out"        # e.g., E:/msr_data/out_mr_out
  shards  = ${mr.shards}
}
embed {
  model    = "mxbai-embed-large"
  maxChars = 1000
  overlap  = 200
  batch    = 16
}
answer {
  model = "llama3.2:1b-instruct-q4_K_M"
}
ask {
  k                 = 8
  perShardFetch     = 10
  minTopScore       = 0.35
  minKeywordOverlap = 2
  temperature       = 0.2
  numCtxTokens      = 2048
  refusal           = "I don't know based on the MSR corpus."
}
